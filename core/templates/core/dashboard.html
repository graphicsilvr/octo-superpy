<!DOCTYPE html>
<html>
  <head>
    <title>Octo-Superpy Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="container mt-5">
    <h1 class="mb-4">Octo-Superpy Inventory</h1>
    <p>Status: <span class="badge bg-success">{{ status }}</span></p>

    <table class="table table-striped">
      <thead>
        <tr>
          <th>Product</th>
          <th>Count</th>
        </tr>
      </thead>
      <tbody>
        {% for item in inventory %}
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.count }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
